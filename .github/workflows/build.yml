name: Build Artifacts

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional build version override, for example 0.29.0'
        required: false
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: pnpm run build

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache-dependency-path: backend/go.sum

      - name: Verify Go version
        run: go version | grep -q 'go1.26.4'

      - name: Set build version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            VERSION="${VERSION#v}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="$(tr -d '\r\n' < backend/cmd/server/VERSION)"
          fi

          echo "$VERSION" > backend/cmd/server/VERSION
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set repository metadata
        id: repo
        run: |
          echo "owner_lower=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
          echo "name=${{ github.event.repository.name }}" >> "$GITHUB_OUTPUT"

      - name: Build Linux binary artifacts
        uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: release --snapshot --clean --skip=publish --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_MESSAGE: Snapshot build
          GITHUB_REPO_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO_OWNER_LOWER: ${{ steps.repo.outputs.owner_lower }}
          GITHUB_REPO_NAME: ${{ steps.repo.outputs.name }}
          DOCKERHUB_USERNAME: skip

      - name: Upload Linux binary artifacts
        uses: actions/upload-artifact@v7
        with:
          name: sub2api-admin-plus-${{ steps.version.outputs.version }}-linux
          path: |
            dist/*.tar.gz
            dist/checksums.txt
            dist/metadata.json
          if-no-files-found: error
