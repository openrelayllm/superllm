name: DockerHub

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag, for example 0.7.3'
        required: true
        default: '0.7.3'
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push linux/amd64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            VERSION=${{ inputs.tag }}
            COMMIT=${{ github.sha }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/sub2api-admin-plus:${{ inputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/sub2api-admin-plus:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ inputs.tag }}
