name: DockerHub

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag, for example 0.14.0'
        required: true
        default: '0.14.0'
        type: string
      ref:
        description: 'Git ref to build from, for example main or v0.14.0'
        required: true
        default: 'main'
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Resolve commit
        id: git
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Linux images
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ inputs.tag }}
            COMMIT=${{ steps.git.outputs.sha }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/sub2api-admin-plus:${{ inputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/sub2api-admin-plus:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.git.outputs.sha }}
            org.opencontainers.image.version=${{ inputs.tag }}
