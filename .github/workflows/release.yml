name: GitHub Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Annotated tag to publish, for example v0.29.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: pnpm run build

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache-dependency-path: backend/go.sum

      - name: Verify Go version
        run: go version | grep -q 'go1.26.4'

      - name: Set release version
        run: |
          VERSION="${{ inputs.tag }}"
          VERSION="${VERSION#v}"
          echo "$VERSION" > backend/cmd/server/VERSION
          echo "Publishing GitHub Release for $VERSION"

      - name: Fetch tags with annotations
        run: git fetch --tags --force

      - name: Get tag message
        id: tag_message
        run: |
          TAG_NAME="${{ inputs.tag }}"
          TAG_MESSAGE="$(git tag -l --format='%(contents:body)' "$TAG_NAME")"

          echo "message<<EOF" >> "$GITHUB_OUTPUT"
          echo "$TAG_MESSAGE" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Set repository metadata
        id: repo
        run: |
          echo "owner_lower=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
          echo "name=${{ github.event.repository.name }}" >> "$GITHUB_OUTPUT"

      - name: Publish Linux binary release
        uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: release --clean --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_MESSAGE: ${{ steps.tag_message.outputs.message }}
          GITHUB_REPO_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO_OWNER_LOWER: ${{ steps.repo.outputs.owner_lower }}
          GITHUB_REPO_NAME: ${{ steps.repo.outputs.name }}
          DOCKERHUB_USERNAME: skip
